# This patch configures secure metrics serving for the controller and frr-metrics containers.
# The controller uses controller-runtime SecureServing with auto-generated self-signed certs.
# The frr-metrics exporter always serves HTTPS with auto-generated self-signed certs.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemon
  namespace: system
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64
                    - arm64
                    - ppc64le
                    - s390x
                - key: kubernetes.io/os
                  operator: In
                  values:
                    - linux
      containers:
      - name: controller
        args:
        - "--metrics-bind-address=0.0.0.0:9140"
        - "--node-name=$(NODE_NAME)"
        - "--namespace=$(NAMESPACE)"
        - "--log-level=info"
        ports:
        - containerPort: 9140
          name: metricshttps
      - name: frr
        livenessProbe:
          httpGet:
            path: /livez
            port: 9141
            scheme: HTTPS
          periodSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /livez
            port: 9141
            scheme: HTTPS
          failureThreshold: 30
          periodSeconds: 5
      - name: frr-metrics
        args:
        - --metrics-port=9141
        - --metrics-bind-address=0.0.0.0
        ports:
        - containerPort: 9141
          name: frrmetricshttps
